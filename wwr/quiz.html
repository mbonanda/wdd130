<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML And CSS Quiz</title>
    <link rel="stylesheet" href="poll_form_styles/poll_form.css" type="text/css">
</head>
<body>
    <header>
        <h1>Basic HTML And CSS Quiz</h1>
    </header>
    <main>
        <form>
            
            <fieldset>
                <legend>Questions</legend>
                <!--form elements will go here-->
                <label for="browser">What is your favorite browser?</label>
                <select id="browser" name="browser">
                    <option value="chrome">Chrome</option>
                    <option value="firefox">Firefox</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                    <option value="other">Other</option>
                </select>
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
                <label for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu Mali"></textarea>
           </fieldset>
           <button type="submit">Submit Poll</button>
        </form>
        <div class="form-item column2">
            <label for="fullname">Full Name:</label>
        </div>
        <div class="form-item column2">
            <label for="usermaiil">Email</label>
            <input type="email" id="usermail" name="usermail">
        </div>
    </main>    
</body>
<footer>
    <p>&copy;2024 | Basic HTML And CSS Quiz | Abe Mbonani</p>
</footer>
</html>
