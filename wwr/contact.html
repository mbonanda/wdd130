    <main>
        <h1>Contact Us</h1>    
        <section>
                <form>
                    <fieldset>
                        <legend>Contact Information</legend>
                        <!--form elements will go here-->
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname">
                        <lable for="email">Email:</lable>
                        <input type="email" id="usermail" name="usermail">
                    </fieldset>
                    <fieldset>
                        <legend>Questions</legend>
                        <!--form elements will go here-->
                        <label for="browser">What is your favorite browser?</label>
                        <select id="browser" name="browser">
                            <option value="chrome">Chrome</option>
                            <option value="firefox">Firefox</option>
                            <option value="safari">Safari</option>
                            <option value="edge">Edge</option>
                            <option value="brave">Brave</option>
                            <option value="other">Other</option>
                        </select>
                        <label for="pet">Do you have a household pet?</label>
                        <input type="checkbox" id="pet" name="pet">
                        <label for="feedback">List the places you have lived:</label>
                        <textarea id="feedback" name="feedback" rows="4" placeholder="Waterkloof Pretoria, Paarl Cape Town, Pietermaritzburg Durban"></textarea>
                   </fieldset>
                   <button type="submit Details">Submit</button>
                </form>
                
                <h2>Company Information</h2>
                <p>
                    <p>211 Main Street</p>
                    <P>Waterkloof</P>
                    <P>Pretoria</P>
                    <p>Gauteng Province</p>
